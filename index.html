<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glash Wear - Tienda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- BARRA SUPERIOR -->
        <div class="top-bar">
            <div class="logo">NESTOR ARROYO</div>
            <div class="top-icons">
                <i class="fas fa-search" id="searchIcon"></i>
                <i class="fas fa-shopping-cart" id="cartIcon"></i>
                <i class="fas fa-bell" id="notifIcon"></i>
            </div>
        </div>

        <!-- BARRA DE BÚSQUEDA -->
        <div class="search-bar" id="searchBar" style="display: none;">
            <input type="text" id="searchInput" placeholder="Buscar productos...">
        </div>

        <!-- SLIDER -->
        <div class="slider-container">
            <div class="slider" id="slider">
                <div class="slide"><img src="https://via.placeholder.com/400x200/ff7eb3/fff?text=Oferta+1" alt="Slide 1"></div>
                <div class="slide"><img src="https://via.placeholder.com/400x200/7f5eff/fff?text=Nueva+Coleccion" alt="Slide 2"></div>
                <div class="slide"><img src="https://via.placeholder.com/400x200/ffd166/000?text=Descuentos" alt="Slide 3"></div>
            </div>
        </div>

        <!-- BLOG / NOTIFICACIÓN -->
        <div class="blog-section" id="blogSection">
            <h3>📢 Novedades</h3>
            <p id="blogMessage">Cargando...</p>
        </div>

        <!-- PRODUCTOS -->
        <div class="products-section">
            <h2>🔥 Lo Último</h2>
            <div class="products-grid" id="productsGrid">
                <p>Cargando productos...</p>
            </div>
        </div>

        <!-- FLYERS -->
        <div class="flyers-section" id="flyersSection">
            <!-- Se llenará con JS -->
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <p>© 2024 Glash Wear. Todos los derechos reservados.</p>
            <p style="font-size:0.8rem; margin-top:10px;">Síguenos en @glashwear</p>
        </div>
    </div>

    <!-- MODAL DEL PRODUCTO -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <img id="modalImage" src="" alt="Producto">
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <h3 id="modalPrice"></h3>
            <button id="addToCartBtn" class="add-to-cart-btn">Añadir al Carrito</button>
        </div>
    </div>

    <!-- MODAL DEL CARRITO -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close-cart">&times;</span>
            <h2>🛒 Tu Carrito</h2>
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotal"></div>
            <button id="checkoutBtn" class="checkout-btn">Finalizar Compra</button>
        </div>
    </div>

    <!-- MODAL DE CHECKOUT -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close-checkout">&times;</span>
            <h2>📝 Datos de Envío</h2>
            <input type="text" id="checkoutName" placeholder="Nombre completo" class="checkout-input">
            <input type="tel" id="checkoutPhone" placeholder="Celular" class="checkout-input">
            <input type="email" id="checkoutEmail" placeholder="Correo electrónico" class="checkout-input">
            <button id="submitOrderBtn" class="submit-btn">Enviar Pedido</button>
            <div id="loadingSpinner" style="display: none;">Enviando...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
