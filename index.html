<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glash Wear - Tienda</title>
    <!-- Font Awesome (íconos gratis) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- BARRA SUPERIOR -->
        <div class="top-bar">
            <div class="logo">GLASH WEAR</div>
            <div class="top-icons">
                <i class="fas fa-search" id="searchIcon"></i>
                <i class="fas fa-shopping-cart" id="cartIcon"></i>
                <i class="fas fa-bell" id="notifIcon"></i>
            </div>
        </div>

        <!-- BARRA DE BÚSQUEDA (aparece al hacer clic en lupa) -->
        <div class="search-bar" id="searchBar" style="display: none;">
            <input type="text" id="searchInput" placeholder="Buscar camisetas, jeans...">
        </div>

        <!-- SLIDER CARRUSEL -->
        <div class="slider-container glass-card">
            <div class="slider" id="slider">
                <!-- Las imágenes se cargarán desde JS -->
                <div class="slide"><img src="https://via.placeholder.com/400x200/ff7eb3/fff?text=Oferta+1" alt="Slide 1"></div>
                <div class="slide"><img src="https://via.placeholder.com/400x200/7f5eff/fff?text=Nueva+Coleccion" alt="Slide 2"></div>
                <div class="slide"><img src="https://via.placeholder.com/400x200/ffd166/000?text=Descuentos" alt="Slide 3"></div>
            </div>
        </div>

        <!-- BLOG / NOTAS -->
        <div class="blog-section glass-card" style="margin:15px; padding:15px;">
            <h3>📢 Novedades</h3>
            <p id="blogMessage">Bienvenidos a la nueva tienda. Pronto más actualizaciones.</p>
        </div>

        <!-- PRODUCTOS -->
        <div class="products-section">
            <h2>🔥 Lo Último</h2>
            <div class="products-grid" id="productsGrid">
                <!-- Los productos se cargarán desde el JSON -->
            </div>
        </div>

        <!-- FLYERS DESLIZABLES -->
        <div class="flyers-section" style="margin:15px; overflow-x:auto; white-space:nowrap; padding:10px 0;">
            <div style="display:inline-block; width:150px; height:100px; background:#e0e0e0; border-radius:15px; margin-right:10px;"></div>
            <div style="display:inline-block; width:150px; height:100px; background:#d0d0d0; border-radius:15px; margin-right:10px;"></div>
            <div style="display:inline-block; width:150px; height:100px; background:#c0c0c0; border-radius:15px;"></div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <p>© 2024 Glash Wear. Todos los derechos reservados.</p>
            <p style="font-size:0.8rem; margin-top:10px;">Síguenos en @glashwear</p>
        </div>
    </div>

    <!-- VENTANA MODAL DEL PRODUCTO (Pantalla completa) -->
    <div id="productModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:1000; overflow-y:auto;">
        <div style="padding:20px;">
            <i class="fas fa-times" id="closeModal" style="font-size:2rem; float:right; cursor:pointer;"></i>
            <div style="clear:both;"></div>
            <img id="modalImage" src="" style="width:100%; border-radius:20px; margin:20px 0;">
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <h3 id="modalPrice"></h3>
            <button id="addToCartBtn" style="width:100%; padding:15px; background:#7f5eff; color:white; border:none; border-radius:30px; font-size:1.2rem; margin-top:20px;">Añadir al Carrito</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
