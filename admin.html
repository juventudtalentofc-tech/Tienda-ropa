<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; margin:0; padding:0; box-sizing:border-box; }
        body { background:#f0f2f5; padding:20px; }
        .admin-container { max-width:800px; margin:0 auto; }
        h1 { margin-bottom:20px; }
        .admin-card { background:white; border-radius:20px; padding:20px; margin-bottom:20px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
        .admin-card h2 { margin-bottom:15px; font-size:1.2rem; }
        input, textarea { width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:10px; }
        button { background:#7f5eff; color:white; border:none; padding:12px 20px; border-radius:30px; cursor:pointer; margin-right:10px; }
        .product-item { display:flex; justify-content:space-between; align-items:center; padding:10px; background:#f9f9f9; border-radius:10px; margin:5px 0; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>🧑‍💻 Panel de Control</h1>
        
        <!-- SECCIÓN CARRUSEL -->
        <div class="admin-card">
            <h2>📸 Imágenes del Carrusel</h2>
            <input type="text" id="slide1" placeholder="URL Imagen 1">
            <input type="text" id="slide2" placeholder="URL Imagen 2">
            <input type="text" id="slide3" placeholder="URL Imagen 3">
            <button onclick="guardarCarrusel()">Guardar Carrusel</button>
        </div>

        <!-- SECCIÓN PRODUCTOS -->
        <div class="admin-card">
            <h2>👕 Productos</h2>
            <div id="productosList"></div>
            <h3>Agregar Nuevo</h3>
            <input type="text" id="newNombre" placeholder="Nombre">
            <input type="number" id="newPrecio" placeholder="Precio">
            <input type="text" id="newDesc" placeholder="Descripción">
            <input type="text" id="newImg" placeholder="URL Imagen">
            <button onclick="agregarProducto()">➕ Agregar Producto</button>
        </div>

        <!-- SECCIÓN NOTIFICACIÓN (CAMPANA) -->
        <div class="admin-card">
            <h2>🔔 Notificación (Campanita)</h2>
            <textarea id="notifMensaje" rows="3" placeholder="Escribe el mensaje para los usuarios..."></textarea>
            <button onclick="guardarNotificacion()">Enviar Notificación</button>
        </div>

        <!-- SECCIÓN BLOG / NOTA -->
        <div class="admin-card">
            <h2>📝 Blog / Nota Central</h2>
            <textarea id="blogMensaje" rows="3" placeholder="Mensaje del blog..."></textarea>
            <button onclick="guardarBlog()">Actualizar Blog</button>
        </div>

        <!-- SECCIÓN PEDIDOS -->
        <div class="admin-card">
            <h2>📦 Pedidos Realizados</h2>
            <div id="pedidosList">No hay pedidos aún.</div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
