<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .admin-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .admin-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .admin-card h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.3rem;
            border-bottom: 2px solid #764ba2;
            padding-bottom: 10px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: border 0.3s;
        }
        
        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #764ba2;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button.danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .product-list {
            margin-top: 20px;
        }
        
        .product-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .product-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .product-info p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .product-actions button {
            padding: 8px 15px;
            margin: 0 5px;
        }
        
        .notification-badge {
            background: #f5576c;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid transparent;
        }
        
        .tab-btn.active {
            background: white;
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>🧑‍💻 Panel de Control - Glash Wear</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="mostrarSeccion('carrusel')">📸 Carrusel</button>
            <button class="tab-btn" onclick="mostrarSeccion('productos')">👕 Productos</button>
            <button class="tab-btn" onclick="mostrarSeccion('notificacion')">🔔 Notificaciones</button>
            <button class="tab-btn" onclick="mostrarSeccion('blog')">📝 Blog</button>
            <button class="tab-btn" onclick="mostrarSeccion('flyers')">🎯 Flyers</button>
            <button class="tab-btn" onclick="mostrarSeccion('pedidos')">📦 Pedidos</button>
        </div>
        
        <!-- SECCIÓN CARRUSEL -->
        <div id="seccion-carrusel" class="admin-card">
            <h2>📸 Imágenes del Carrusel</h2>
            <div class="input-group">
                <label>Imagen 1 (URL)</label>
                <input type="text" id="slide1" placeholder="https://ejemplo.com/imagen1.jpg">
            </div>
            <div class="input-group">
                <label>Imagen 2 (URL)</label>
                <input type="text" id="slide2" placeholder="https://ejemplo.com/imagen2.jpg">
            </div>
            <div class="input-group">
                <label>Imagen 3 (URL)</label>
                <input type="text" id="slide3" placeholder="https://ejemplo.com/imagen3.jpg">
            </div>
            <button onclick="guardarCarrusel()">💾 Guardar Carrusel</button>
        </div>
        
        <!-- SECCIÓN PRODUCTOS -->
        <div id="seccion-productos" class="admin-card" style="display: none;">
            <h2>👕 Productos</h2>
            <div class="input-group">
                <label>Nombre del producto</label>
                <input type="text" id="prodNombre" placeholder="Ej: Camiseta Básica">
            </div>
            <div class="input-group">
                <label>Precio</label>
                <input type="number" id="prodPrecio" placeholder="25.99">
            </div>
            <div class="input-group">
                <label>Descripción</label>
                <textarea id="prodDesc" rows="3" placeholder="Descripción del producto"></textarea>
            </div>
            <div class="input-group">
                <label>URL de la imagen</label>
                <input type="text" id="prodImg" placeholder="https://ejemplo.com/imagen.jpg">
            </div>
            <button onclick="agregarProducto()">➕ Agregar Producto</button>
            
            <div class="product-list" id="productosLista">
                <!-- Se llenará con JS -->
            </div>
        </div>
        
        <!-- SECCIÓN NOTIFICACIÓN -->
        <div id="seccion-notificacion" class="admin-card" style="display: none;">
            <h2>🔔 Notificación (Campanita)</h2>
            <div class="input-group">
                <label>Mensaje de notificación</label>
                <textarea id="notifMensaje" rows="4" placeholder="Escribe el mensaje que verán los usuarios..."></textarea>
            </div>
            <button onclick="guardarNotificacion()">🔔 Enviar Notificación</button>
        </div>
        
        <!-- SECCIÓN BLOG -->
        <div id="seccion-blog" class="admin-card" style="display: none;">
            <h2>📝 Blog / Nota Central</h2>
            <div class="input-group">
                <label>Mensaje del blog</label>
                <textarea id="blogMensaje" rows="4" placeholder="Escribe la nota que aparecerá en la página principal..."></textarea>
            </div>
            <button onclick="guardarBlog()">📝 Actualizar Blog</button>
        </div>
        
        <!-- SECCIÓN FLYERS -->
        <div id="seccion-flyers" class="admin-card" style="display: none;">
            <h2>🎯 Flyers Publicitarios</h2>
            <div class="input-group">
                <label>Flyer 1 (URL)</label>
                <input type="text" id="flyer1" placeholder="https://ejemplo.com/flyer1.jpg">
            </div>
            <div class="input-group">
                <label>Flyer 2 (URL)</label>
                <input type="text" id="flyer2" placeholder="https://ejemplo.com/flyer2.jpg">
            </div>
            <div class="input-group">
                <label>Flyer 3 (URL)</label>
                <input type="text" id="flyer3" placeholder="https://ejemplo.com/flyer3.jpg">
            </div>
            <button onclick="guardarFlyers()">🎯 Guardar Flyers</button>
        </div>
        
        <!-- SECCIÓN PEDIDOS -->
        <div id="seccion-pedidos" class="admin-card" style="display: none;">
            <h2>📦 Pedidos Recibidos</h2>
            <div id="pedidosLista">
                <!-- Se llenará con JS -->
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
